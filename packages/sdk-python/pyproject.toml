[tool.poetry]
name = "kairoslabs"
version = "0.1.0"
description = "Kairos Python SDK — RAG tracing and agent reliability testing"
authors = ["Atharv Puranik"]
license = "Apache-2.0"
readme = "README.md"
packages = [{ include = "kairos" }]

[tool.poetry.dependencies]
python = "^3.10"
httpx = ">=0.27,<1.0"
pydantic = "^2.7"
langchain-core = { version = "^0.3", optional = true }

[tool.poetry.extras]
langchain = ["langchain-core"]

[tool.poetry.group.dev.dependencies]
pytest = "^8.3"
pytest-asyncio = "^0.24"
respx = "^0.21"
langchain = "^0.3"
langchain-core = "^0.3"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
