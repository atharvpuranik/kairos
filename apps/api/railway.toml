# Railway config for the API service. Create a SECOND Railway service from the
# same repo/root for the worker and override its start command to:
#   python -m workers.eval_worker
# (see docs/deploying.mdx)
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
